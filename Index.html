<!DOCTYPE html>
<html>
<head>
  <title> POLYSHOP </title>
  <style>
	
        body {
               font-family: sans-serif;
               margin: 0;
               padding: 0;
               background-color:#F5F3FF;
               color:#1F2937;    
		       min-height: 100vh;    
		       display: flex    ;
               flex-direction: column;
             }
        header {
                background-color:#DDD6FE;
                color:#1F2937;
                padding: 10px;
                text-align: center;
			    border: 5px solid #E5E7EB;
    			margin-bottom: 0px;
	        	}
	 	header h1 {
		        margin-bottom: 0
				  }
		header p {
		          margin-top: 0
				     }
    .search-box {
                 display: flex;
				       	 width: 100%;
				      	 padding: 0 10px; 
				      	 box-sizing: border-box;
				        	}
   .search-box input {
                      flex: 1;
						          padding: 10px;
						          border: 1px solid #E5E7EB;
                      border-radius: 8px 0 0 8px;
						          }
    .search-box button {
                        padding: 10px 15px;
                        border: none;
                        background: #7C3AED;
                        color: white;
                        border-radius: 0 8px 8px 0;
	                     	}
		
        nav {
              background-color:#C4B5FD;
              padding: 5px;
    		    	display:flex;
	    		    border-bottom: 2px solid #E5E7EB;
		         	width: 100%;
			      	justify-content: center;
				      gap: 50px
	            }
        nav a {
                color: #1F2937;
                text-decoration: none;
                font-weight: bold;
                padding: 5px 20px;
                margin: 0 10px;
                display: inline-block;
              }
			  nav a:hover {
                     background-color: #5B21B6;
						         color:#FFFFFF;
					        	 }
      .container {
                  display: flex;
                  flex-wrap: wrap;
                  justify-content: center;
                  gap: 20px;
                  padding: 20px;
	              }
	    .a1, .a2, .a3, .a4, .a5,
      .a6, .a7, .a8, .a9 {
                           background-color: #FFFFFF;
                           border: 1px solid #E5E7EB;
                           border-radius: 8px;
                           width: 250px;
                           padding: 15px;
                           text-align: center;
                           box-shadow: 0 2px 5px rgba(0,0,0,0.1);
                         }
      img { width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
          }
		button {
            background-color: #7C3AED;
			     	color: #FFFFFF;
			      }
	  button:hover {background-color: #5B21B6}
        footer {
                background-color:#DDD6FE;
		          	color: #1F2937;
    			      text-align: center;
	    		      border-top : 5px solid #E5E7EB;
                bottom: 0;
	    	       }
  </style>
</head>
<body>
  <header>
    <h1> POLYSHOP </h1>
    <p> Trang thương mại điện tử chính hãng </p>
  </header>
  
  <div class="search-box">
    <input type="text" placeholder="Tìm sản phẩm...">
    <button>🔍</button>
  </div>

  <nav>
    <a href = "#"> Trang chủ </a>
    <a href = "#"> Danh mục </a>
    <a href = "#"> Sự kiện </a>
    <a href = "#"> Giỏ hàng </a>
  </nav>
